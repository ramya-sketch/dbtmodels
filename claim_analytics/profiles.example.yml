# Copy to ~/.dbt/profiles.yml (merge this output into your profiles file).
# Set SNOWFLAKE_PASSWORD in the environment — do not commit real passwords.

claim_analytics:
  target: dev
  outputs:
    dev:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      password: "{{ env_var('SNOWFLAKE_PASSWORD') }}"
      role: "{{ env_var('SNOWFLAKE_ROLE') }}"
      warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE') }}"
      database: DQLABS_QA
      schema: RUNFAILURE
      threads: 4
