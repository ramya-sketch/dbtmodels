version: 2

models:

  - name: customer_sales
    description: "Gold table with customer-level metrics, including total spend, order counts, favorite category, and last order date."
    columns:
      - name: CUSTOMER_ID
        description: "Unique customer identifier"
        tests:
          - not_null
          - unique
      - name: TOTAL_ORDERS
        description: "Total number of orders by the customer"
        tests:
          - not_null
      - name: TOTAL_SPEND
        description: "Total amount spent by the customer"
        tests:
          - not_null
      - name: AVG_ORDER_VALUE
        description: "Average value per order"
      - name: LAST_ORDER_DATE
        description: "Most recent order date for the customer"
      - name: FAVORITE_CATEGORY
        description: "Product category with the highest total spend for the customer"

  - name: product_performance
    description: "Gold table summarizing product performance metrics including sales, quantity sold, margin, and ranking."
    columns:
      - name: PRODUCT_ID
        description: "Unique product identifier"
        tests:
          - not_null
          - unique
      - name: TOTAL_QTY_SOLD
        description: "Total quantity of product sold"
      - name: TOTAL_SALES
        description: "Total revenue generated by product"
      - name: TOTAL_MARGIN
        description: "Total margin from product sales"
      - name: CATEGORY_RANK
        description: "Rank of the product within its category based on sales"
      - name: GLOBAL_RANK
        description: "Overall rank of product based on sales"

  - name: employee_performance
    description: "Gold table summarizing employee sales performance and estimated commissions."
    columns:
      - name: EMPLOYEE_ID
        description: "Unique employee identifier"
        tests:
          - not_null
          - unique
      - name: TOTAL_ORDERS_HANDLED
        description: "Number of orders handled by employee"
      - name: TOTAL_REVENUE_HANDLED
        description: "Total revenue handled by employee"
      - name: AVG_ORDER_VALUE
        description: "Average order value handled by employee"
      - name: ESTIMATED_COMMISSION
        description: "Estimated commission based on revenue handled"

  - name: order_summary
    description: "Gold table summarizing orders, including customer, employee, and net revenue."
    columns:
      - name: ORDER_ID
        description: "Unique order identifier"
        tests:
          - not_null
          - unique
      - name: CUSTOMER_ID
        description: "Customer who placed the order"
        tests:
          - relationships:
              arguments:
                to: ref('customer_sales')
                field: CUSTOMER_ID
      - name: EMPLOYEE_ID
        description: "Employee who handled the order"
        tests:
          - relationships:
              arguments:
                to: ref('employee_performance')
                field: EMPLOYEE_ID
      - name: NET_REVENUE
        description: "Net revenue for the order after discount, tax, and shipping"
      - name: NUM_ITEMS
        description: "Number of items in the order"
      - name: ORDER_TOTAL
        description: "Original order total amount"
